<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --border: #2a2a38;
    --border2: #3a3a50;
    --text: #e8e8f0;
    --text2: #9090b0;
    --text3: #5a5a78;
    --accent: #7c6dfa;
    --accent2: #a594fd;
    --green: #3ddc84;
    --red: #ff5c5c;
    --yellow: #ffc34d;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  .app { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  .header { margin-bottom: 2.5rem; }
  .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text); }
  .header h1 span { color: var(--accent2); }
  .header p { color: var(--text2); font-size: 0.9rem; margin-top: 0.4rem; font-family: var(--mono); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; border-radius: 2px; }

  .stats { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 1.1rem; font-family: var(--mono); font-size: 0.8rem; }
  .stat-val { font-size: 1.2rem; font-weight: 700; display: block; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.acc { color: var(--accent2); }

  .question-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .q-number { font-family: var(--mono); font-size: 0.75rem; color: var(--text3); margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .q-text { font-size: 1rem; line-height: 1.6; color: var(--text); margin-bottom: 1.2rem; }
  .q-text strong { color: var(--accent2); font-weight: 700; }

  .schema-toggle { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); cursor: pointer; border: 1px solid var(--border2); border-radius: 6px; padding: 0.3rem 0.7rem; display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; margin-bottom: 1rem; }
  .schema-toggle:hover { border-color: var(--accent); background: rgba(124,109,250,0.08); }

  .schema-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-bottom: 1.2rem; font-family: var(--mono); font-size: 0.78rem; }
  .schema-box h4 { color: var(--yellow); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
  .schema-grid { display: flex; gap: 1.2rem; flex-wrap: wrap; }
  .schema-table { min-width: 140px; }
  .schema-table-name { color: var(--accent2); font-weight: 700; font-size: 0.85rem; margin-bottom: 0.4rem; }
  .schema-col { color: var(--text2); padding: 0.15rem 0; border-bottom: 1px solid var(--border); font-size: 0.76rem; }
  .schema-col:last-child { border-bottom: none; }
  .schema-col .col-name { color: var(--text); }
  .schema-col .col-pk { color: var(--yellow); font-size: 0.65rem; margin-left: 0.3rem; }
  .schema-col .col-fk { color: var(--green); font-size: 0.65rem; margin-left: 0.3rem; }

  .editor-wrap { position: relative; }
  .sql-editor { width: 100%; min-height: 100px; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 10px; padding: 1rem; font-family: var(--mono); font-size: 0.88rem; color: var(--text); resize: vertical; outline: none; line-height: 1.7; transition: border-color 0.2s; }
  .sql-editor:focus { border-color: var(--accent); }
  .sql-editor.correct { border-color: var(--green); }
  .sql-editor.wrong { border-color: var(--red); }

  .actions { display: flex; gap: 0.8rem; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--sans); font-weight: 700; font-size: 0.88rem; border: none; border-radius: 8px; padding: 0.6rem 1.3rem; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); background: var(--border); }
  .btn-skip { background: transparent; color: var(--text3); border: 1px solid var(--border); font-size: 0.8rem; }
  .btn-skip:hover { color: var(--text2); border-color: var(--border2); }

  .feedback { margin-top: 1rem; border-radius: 10px; padding: 1rem 1.2rem; font-family: var(--mono); font-size: 0.82rem; line-height: 1.6; }
  .feedback.correct { background: rgba(61,220,132,0.08); border: 1px solid rgba(61,220,132,0.25); color: var(--green); }
  .feedback.wrong { background: rgba(255,92,92,0.08); border: 1px solid rgba(255,92,92,0.25); color: var(--red); }
  .feedback .label { font-weight: 700; font-size: 0.85rem; margin-bottom: 0.4rem; display: block; }
  .feedback .expected { margin-top: 0.6rem; padding-top: 0.6rem; border-top: 1px solid rgba(255,255,255,0.08); color: var(--text2); }
  .feedback .expected span { color: var(--text); }

  .hint-btn { font-family: var(--mono); font-size: 0.75rem; color: var(--text3); cursor: pointer; background: none; border: none; margin-left: auto; }
  .hint-btn:hover { color: var(--yellow); }
  .hint-box { background: rgba(255,195,77,0.06); border: 1px solid rgba(255,195,77,0.2); border-radius: 8px; padding: 0.7rem 1rem; margin-top: 0.8rem; font-family: var(--mono); font-size: 0.8rem; color: var(--yellow); line-height: 1.6; }

  .next-btn-wrap { margin-top: 1.2rem; }

  .summary { text-align: center; padding: 3rem 2rem; }
  .summary h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; }
  .summary .score { font-size: 4rem; font-weight: 800; color: var(--accent2); display: block; margin: 1rem 0; font-family: var(--mono); }
  .summary p { color: var(--text2); margin-bottom: 2rem; font-family: var(--mono); }

  .q-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
  .tag { font-family: var(--mono); font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .tag-join { background: rgba(124,109,250,0.15); color: var(--accent2); }
  .tag-where { background: rgba(61,220,132,0.12); color: var(--green); }
  .tag-order { background: rgba(255,195,77,0.12); color: var(--yellow); }
  .tag-group { background: rgba(255,92,92,0.12); color: var(--red); }
  .tag-limit { background: rgba(144,144,176,0.15); color: var(--text2); }
  .tag-left { background: rgba(255,150,50,0.12); color: #ff9632; }
  .tag-count { background: rgba(100,200,255,0.12); color: #64c8ff; }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.5rem; }
    .schema-grid { flex-direction: column; }
  }
</style>

function normalize(sql) {
  return sql
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase()
    .replace(/['"]/g, "'")
    .replace(/\s*=\s*/g, '=')
    .replace(/\s*,\s*/g, ',')
    .replace(/\s*\(\s*/g, '(')
    .replace(/\s*\)\s*/g, ')')
    .replace(/;$/, '')
    .trim();
}

function checkSQL(userSQL, solutions) {
  const userNorm = normalize(userSQL);
  return solutions.some(sol => normalize(sol) === userNorm);
}

function fuzzyCheck(userSQL, solutions) {
  const u = normalize(userSQL);
  const keywords = ['select', 'from', 'where', 'join', 'order by', 'group by', 'limit', 'having', 'inner join', 'left join', 'on', 'as'];
  let score = 0;
  keywords.forEach(kw => {
    if (u.includes(kw) && solutions.some(s => normalize(s).includes(kw))) score++;
  });
  return score;
}

    tables: ['KRAJE', 'OSOBY'],

    primarySolution: 'ALTER TABLE'

];

let state = {
  current: 0,
  answered: {},
  showSchema: false,
  showHint: false,
  userInput: '',
  done: false
};

function renderSchema(tableNames) {
  if (!tableNames.length) return '';
  return tableNames.map(name => {
    const t = TABLES[name];
    if (!t) return '';
    const cols = t.cols.map(c => `
      <div class="schema-col">
        <span class="col-name">${c.name}</span>
        <span style="color:var(--text3)"> · ${c.type}</span>
        ${c.pk ? '<span class="col-pk">PK</span>' : ''}
        ${c.fk ? `<span class="col-fk">FK→${c.fk}</span>` : ''}
      </div>`).join('');
    return `<div class="schema-table">
      <div class="schema-table-name">${name}</div>
      ${cols}
    </div>`;
  }).join('');
}

function renderTagBadge(tag) {
  const map = {
    join: ['tag-join', 'INNER JOIN'],
    where: ['tag-where', 'WHERE'],
    order: ['tag-order', 'ORDER BY'],
    group: ['tag-group', 'GROUP BY'],
    limit: ['tag-limit', 'LIMIT'],
    left: ['tag-left', 'LEFT JOIN'],
    count: ['tag-count', 'COUNT'],
  };
  const [cls, label] = map[tag] || ['tag-where', tag.toUpperCase()];
  return `<span class="tag ${cls}">${label}</span>`;
}

function render() {
  const root = document.getElementById('root');
  if (state.done) {
    const correct = Object.values(state.answered).filter(a => a.correct).length;
    const total = QUESTIONS.length;
    const pct = Math.round(correct / total * 100);
    root.innerHTML = `
      <div class="summary">
        <h2>Gotowe! 🎉</h2>
        <span class="score">${correct}/${total}</span>
        <p>${pct}% poprawnych odpowiedzi</p>
        <p style="margin-bottom:1.5rem;color:var(--text2);">${pct >= 80 ? 'Świetny wynik! Jesteś gotowy na kolokwium.' : pct >= 60 ? 'Nieźle! Poćwicz jeszcze trochę.' : 'Wróć do notatek i spróbuj ponownie.'}</p>
        <button class="btn btn-primary" onclick="restartQuiz()">Zacznij od nowa</button>
      </div>`;
    return;
  }

  const q = QUESTIONS[state.current];
  const ans = state.answered[q.id];
  const progress = (state.current / QUESTIONS.length) * 100;
  const correct = Object.values(state.answered).filter(a => a.correct).length;
  const wrong = Object.values(state.answered).filter(a => !a.correct).length;

  let feedbackHTML = '';
  if (ans) {
    if (ans.correct) {
      feedbackHTML = `<div class="feedback correct"><span class="label">✓ Poprawnie!</span></div>`;
    } else {
      feedbackHTML = `<div class="feedback wrong">
        <span class="label">✗ Niepoprawnie</span>
        <div class="expected">Przykładowe poprawne rozwiązanie:<br><span>${q.primarySolution.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span></div>
      </div>`;
    }
  }

  const schemaHTML = state.showSchema && q.tables.length ? `
    <div class="schema-box">
      <h4>Schemat tabel</h4>
      <div class="schema-grid">${renderSchema(q.tables)}</div>
    </div>` : '';

  const hintHTML = state.showHint ? `<div class="hint-box">💡 ${q.hint}</div>` : '';

  const isAnswered = !!ans;

  root.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="stats">
      <div class="stat"><span class="stat-val acc">${state.current + 1}/${QUESTIONS.length}</span>pytanie</div>
      <div class="stat"><span class="stat-val green">${correct}</span>poprawne</div>
      <div class="stat"><span class="stat-val red">${wrong}</span>błędne</div>
    </div>
    <div class="question-card">
      <div class="q-number">pytanie ${state.current + 1} z ${QUESTIONS.length}</div>
      <div class="q-tags">${q.tags.map(renderTagBadge).join('')}</div>
      <div class="q-text">${q.text}</div>
      ${q.tables.length ? `<button class="schema-toggle" onclick="toggleSchema()">
        ${state.showSchema ? '▲ Ukryj schemat' : '▼ Pokaż schemat tabel'}
      </button>` : ''}
      ${schemaHTML}
      <div class="editor-wrap">
        <textarea 
          class="sql-editor${isAnswered ? (ans.correct ? ' correct' : ' wrong') : ''}" 
          id="sqlInput" 
          placeholder="Wpisz zapytanie SQL..."
          ${isAnswered ? 'readonly' : ''}
          onkeydown="handleKey(event)"
        >${isAnswered ? ans.value : state.userInput}</textarea>
      </div>
      ${hintHTML}
      ${feedbackHTML}
      <div class="actions">
        ${!isAnswered ? `
          <button class="btn btn-primary" onclick="checkAnswer()">Sprawdź ↵</button>
          <button class="btn btn-skip" onclick="skipQuestion()">Pomiń →</button>
          <button class="hint-btn" onclick="toggleHint()">💡 podpowiedź</button>
        ` : `
          <button class="btn btn-primary" onclick="nextQuestion()">${state.current < QUESTIONS.length - 1 ? 'Następne →' : 'Zobacz wyniki →'}</button>
        `}
      </div>
    </div>`;

  if (!isAnswered) {
    const ta = document.getElementById('sqlInput');
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }
}

function toggleSchema() {
  state.showSchema = !state.showSchema;
  const val = document.getElementById('sqlInput');
  if (val) state.userInput = val.value;
  render();
}

function toggleHint() {
  state.showHint = !state.showHint;
  const val = document.getElementById('sqlInput');
  if (val) state.userInput = val.value;
  render();
}

function checkAnswer() {
  const ta = document.getElementById('sqlInput');
  const userVal = ta ? ta.value.trim() : '';
  if (!userVal) return;
  const q = QUESTIONS[state.current];
  const correct = checkSQL(userVal, q.solutions);
  state.answered[q.id] = { value: userVal, correct };
  state.showHint = false;
  render();
}

function skipQuestion() {
  const q = QUESTIONS[state.current];
  state.answered[q.id] = { value: '', correct: false, skipped: true };
  nextQuestion();
}

function nextQuestion() {
  state.showHint = false;
  state.userInput = '';
  if (state.current < QUESTIONS.length - 1) {
    state.current++;
    render();
  } else {
    state.done = true;
    render();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    checkAnswer();
  }
}

function restartQuiz() {
  state = { current: 0, answered: {}, showSchema: false, showHint: false, userInput: '', done: false };
  render();
}

render();
</script>
