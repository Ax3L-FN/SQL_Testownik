<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Testownik - Inteligentne porównanie</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#141420;--bg4:#1a1a2a;
  --border:#252535;--border2:#353550;
  --text:#f0f0ff;--text2:#8888aa;--text3:#444466;
  --acc:#6c63ff;--acc2:#9d97ff;--acc3:#c4c0ff;
  --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;--cyan:#00d2ff;
  --mono:'JetBrains Mono',monospace;--display:'Unbounded',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.app{max-width:900px;margin:0 auto;padding:2rem 1.2rem 5rem;position:relative;z-index:1}

/* HEADER */
.hdr{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.hdr h1{font-family:var(--display);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900}
.hdr h1 .hl{color:var(--acc2)}
.hdr-sub{font-size:0.72rem;color:var(--text3);margin-top:.6rem;letter-spacing:.12em}
.set-switcher{display:flex;gap:.4rem;margin-top:1rem;align-items:center;flex-wrap:wrap}
.set-btn{font-family:var(--display);font-size:.65rem;font-weight:700;padding:.4rem .9rem;border-radius:6px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.set-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.reset-progress{background:transparent;border:1.5px solid var(--red);color:var(--red);padding:.4rem .9rem;border-radius:6px;font-size:.65rem;font-weight:700;cursor:pointer;margin-left:.5rem;font-family:var(--display)}
.reset-progress:hover{background:rgba(231,76,60,.15)}

/* PROGRESS */
.progress-wrap{margin-bottom:1.5rem}
.progress-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text3);margin-bottom:.5rem}
.progress-track{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyan));transition:width .5s}

/* STATS */
.stats{display:flex;gap:.7rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.4rem .8rem;font-size:.7rem}
.stat strong{font-size:1.1rem;font-family:var(--display);display:block}
.stat strong.good{color:var(--green)}
.stat strong.bad{color:var(--red)}
.stat strong.pro{color:var(--acc2)}
.stat strong.attempts{color:var(--cyan)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.6rem;margin-bottom:1.5rem;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.3}
.q-meta{display:flex;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.q-num{font-size:.65rem;color:var(--text3);text-transform:uppercase}
.q-tags{display:flex;gap:.35rem;flex-wrap:wrap}
.tag{font-size:.6rem;padding:.18rem .5rem;border-radius:4px;font-weight:700}
.t-join{background:rgba(108,99,255,.15);color:var(--acc2)}
.t-where{background:rgba(46,204,113,.12);color:var(--green)}
.t-order{background:rgba(243,156,18,.12);color:var(--yellow)}
.t-group{background:rgba(231,76,60,.12);color:var(--red)}
.t-agg{background:rgba(0,210,255,.12);color:var(--cyan)}
.q-text{font-size:.95rem;line-height:1.6;margin-bottom:1.3rem}
.q-text strong{color:var(--acc3)}

/* EDITOR */
.sql-editor{width:100%;min-height:100px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1rem;font-family:var(--mono);font-size:.85rem;color:var(--text);resize:vertical;outline:none;line-height:1.6}
.sql-editor:focus{border-color:var(--acc)}

/* FEEDBACK */
.feedback{margin-top:1rem;border-radius:10px;padding:1rem;font-size:.8rem}
.feedback.ok{background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.22);color:var(--green)}
.feedback.fail{background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.22);color:var(--red)}
.feedback .fb-label{font-weight:700;margin-bottom:.4rem;display:block}

/* ACTIONS */
.actions{display:flex;gap:.7rem;margin-top:1.2rem;flex-wrap:wrap}
.btn{font-family:var(--display);font-weight:700;font-size:.7rem;border:none;border-radius:8px;padding:.5rem 1.2rem;cursor:pointer;text-transform:uppercase}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2);transform:translateY(-1px)}
.btn-skip{background:transparent;color:var(--text3);border:1px solid var(--border)}
.btn-hint{background:transparent;color:var(--text3);border:none;cursor:pointer}
.btn-hint:hover{color:var(--yellow)}
.btn-retry{background:transparent;color:var(--yellow);border:1px solid var(--yellow)}
.btn-retry:hover{background:rgba(243,156,18,.1)}
.btn-next{background:var(--acc);color:#fff}
.schema-btn,.expected-btn{font-size:.7rem;background:transparent;border:1px solid var(--border);border-radius:6px;padding:.25rem .7rem;cursor:pointer;margin-right:.5rem;margin-bottom:.5rem;color:var(--text2)}
.schema-btn:hover,.expected-btn:hover{border-color:var(--acc);color:var(--acc2)}
.schema,.expected-box{background:var(--bg3);border-radius:10px;padding:1rem;margin-bottom:1rem}
.schema-grid{display:flex;gap:1.5rem;flex-wrap:wrap}
.s-tbl-name{color:var(--acc2);font-weight:700;margin-bottom:.3rem;font-size:.8rem}
.s-col{padding:.1rem 0;color:var(--text2);font-size:.7rem}
.s-col .cn{color:var(--text)}
.result-table{border-collapse:collapse;font-size:.7rem;width:100%}
.result-table th{background:rgba(108,99,255,.1);padding:.3rem .6rem;border:1px solid var(--border)}
.result-table td{padding:.25rem .6rem;border:1px solid var(--border)}
.nav-dots{display:flex;gap:.3rem;margin-bottom:1rem;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer}
.dot.ok{background:var(--green)}
.dot.fail{background:var(--red)}
.dot.current{background:var(--acc);transform:scale(1.4)}
.hint-box{background:rgba(243,156,18,.05);border:1px solid rgba(243,156,18,.2);border-radius:8px;padding:.7rem;margin-top:.8rem;font-size:.75rem;color:var(--yellow)}
.summary{text-align:center;padding:2rem}
.score-big{font-family:var(--display);font-size:3rem;font-weight:900;color:var(--acc2);display:block}
.btn-restart{background:var(--acc);color:#fff;border:none;border-radius:10px;padding:.8rem 2rem;cursor:pointer;font-weight:700;margin-top:1rem}
.loading{text-align:center;padding:3rem}
.spinner{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.your-result{margin-top:.8rem}
.fb-detail{margin-top:.5rem;font-size:.75rem}
.solution-content{background:var(--bg3);padding:.5rem;border-radius:6px;margin-top:.5rem;white-space:pre-wrap;font-size:.7rem}
@media(max-width:580px){.schema-grid{flex-direction:column}}
</style>
</head>

const SET1 = [
  {id:'1a',set:1,mode:'exec',text:'Wyświetl tytuły filmów z <strong>belgijskich wytwórni</strong>. Posortuj alfabetycznie.',tables:['FILMY','WYTWORNIE','KRAJE'],tags:['join','where','order'],hint:"JOIN, WHERE nazwa_kraju='Belgia'",answer:`SELECT filmy.tytul FROM filmy INNER JOIN wytwornie ON filmy.wytwornia=wytwornie.wytwornia_id INNER JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju='Belgia' ORDER BY filmy.tytul`,primarySolution:`SELECT filmy.tytul FROM filmy JOIN wytwornie ON filmy.wytwornia=wytwornie.wytwornia_id JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju='Belgia' ORDER BY filmy.tytul;`},
  {id:'2a',set:1,mode:'exec',text:'Wyświetl tytuły filmów z <strong>belgijskich lub hiszpańskich wytwórni</strong>. Posortuj alfabetycznie.',tables:['FILMY','WYTWORNIE','KRAJE'],tags:['join','where','order'],hint:"WHERE ... OR ...",answer:`SELECT filmy.tytul FROM filmy INNER JOIN wytwornie ON filmy.wytwornia=wytwornie.wytwornia_id INNER JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju='Belgia' OR kraje.nazwa_kraju='Hiszpania' ORDER BY filmy.tytul`,primarySolution:`SELECT filmy.tytul FROM filmy JOIN wytwornie ON filmy.wytwornia=wytwornie.wytwornia_id JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju IN ('Belgia','Hiszpania') ORDER BY filmy.tytul;`},
  {id:'3a',set:1,mode:'exec',text:'Wyświetl <strong>nazwy krajów i stolice</strong> krajów z kodem państwa. Posortuj odwrotnie alfabetycznie.',tables:['KRAJE'],tags:['where','order'],hint:"WHERE kod IS NOT NULL",answer:`SELECT nazwa_kraju, stolica FROM kraje WHERE kod IS NOT NULL ORDER BY nazwa_kraju DESC`,primarySolution:`SELECT nazwa_kraju, stolica FROM kraje WHERE kod IS NOT NULL ORDER BY nazwa_kraju DESC;`},
  {id:'4a',set:1,mode:'exec',text:'Wyświetl <strong>nazwy krajów i stolice</strong> krajów z kodem państwa. Posortuj odwrotnie wg kodów.',tables:['KRAJE'],tags:['where','order'],hint:"ORDER BY kod DESC",answer:`SELECT nazwa_kraju, stolica FROM kraje WHERE kod IS NOT NULL ORDER BY kod DESC`,primarySolution:`SELECT nazwa_kraju, stolica FROM kraje WHERE kod IS NOT NULL ORDER BY kod DESC;`},
  {id:'5a',set:1,mode:'exec',text:'Wyświetl nazwy wytwórni z krajów osób o nazwiskach <strong>Gauss, Dawkins, Pasteur, Ulam</strong>.',tables:['WYTWORNIE','KRAJE','OSOBY'],tags:['join','where'],hint:"JOIN i DISTINCT",answer:`SELECT DISTINCT wytwornie.nazwa FROM wytwornie INNER JOIN kraje ON wytwornie.kraj=kraje.id_kraju INNER JOIN osoby ON kraje.id_kraju=osoby.kraj WHERE osoby.nazwisko IN ('Gauss','Dawkins','Pasteur','Ulam') ORDER BY wytwornie.nazwa`,primarySolution:`SELECT DISTINCT wytwornie.nazwa FROM wytwornie JOIN kraje ON wytwornie.kraj=kraje.id_kraju JOIN osoby ON kraje.id_kraju=osoby.kraj WHERE osoby.nazwisko IN ('Gauss','Dawkins','Pasteur','Ulam') ORDER BY wytwornie.nazwa;`},
  {id:'6a',set:1,mode:'exec',text:'Wyświetl nazwę i rok założenia <strong>najwcześniej założonej szwedzkiej wytwórni</strong>.',tables:['WYTWORNIE','KRAJE'],tags:['join','order','limit'],hint:"ORDER BY rok_zalozenia ASC LIMIT 1",answer:`SELECT wytwornie.nazwa, wytwornie.rok_zalozenia FROM wytwornie INNER JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju='Szwecja' ORDER BY wytwornie.rok_zalozenia ASC LIMIT 1`,primarySolution:`SELECT nazwa, rok_zalozenia FROM wytwornie JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE nazwa_kraju='Szwecja' ORDER BY rok_zalozenia LIMIT 1;`},
  {id:'7a',set:1,mode:'exec',text:'Wyświetl nazwy <strong>wszystkich klientów i numery zamówień</strong> — łącznie z klientami bez zamówień.',tables:['KLIENCI','ZAMOWIENIA'],tags:['left'],hint:"LEFT JOIN",answer:`SELECT klienci.nazwa, zamowienia.id_zamowienia FROM klienci LEFT JOIN zamowienia ON zamowienia.id_klienta=klienci.id_klienta`,primarySolution:`SELECT klienci.nazwa, zamowienia.id_zamowienia FROM klienci LEFT JOIN zamowienia ON klienci.id_klienta=zamowienia.id_klienta;`},
  {id:'8a',set:1,mode:'exec',text:'Wyświetl <strong>nazwy krajów i liczbę osób</strong> z nich. Posortuj rosnąco wg liczby. Kolumny: "Nazwa kraju", "Liczba osób".',tables:['KRAJE','OSOBY'],tags:['join','agg','group'],hint:"GROUP BY, COUNT, ORDER BY",answer:`SELECT kraje.nazwa_kraju AS 'Nazwa kraju', COUNT(osoby.id_osoby) AS 'Liczba osób' FROM kraje INNER JOIN osoby ON kraje.id_kraju=osoby.kraj GROUP BY kraje.nazwa_kraju ORDER BY COUNT(osoby.id_osoby)`,primarySolution:`SELECT kraje.nazwa_kraju AS 'Nazwa kraju', COUNT(*) AS 'Liczba osób' FROM kraje JOIN osoby ON kraje.id_kraju=osoby.kraj GROUP BY kraje.nazwa_kraju ORDER BY COUNT(*);`},
  {id:'9a',set:1,mode:'exec',text:'Wyświetl <strong>nazwy krajów i liczbę osób</strong> z nich. Posortuj odwrotnie alfabetycznie.',tables:['KRAJE','OSOBY'],tags:['join','agg','group'],hint:"ORDER BY nazwa_kraju DESC",answer:`SELECT kraje.nazwa_kraju, COUNT(osoby.id_osoby) FROM kraje INNER JOIN osoby ON kraje.id_kraju=osoby.kraj GROUP BY kraje.nazwa_kraju ORDER BY kraje.nazwa_kraju DESC`,primarySolution:`SELECT kraje.nazwa_kraju, COUNT(*) FROM kraje JOIN osoby ON kraje.id_kraju=osoby.kraj GROUP BY kraje.nazwa_kraju ORDER BY kraje.nazwa_kraju DESC;`},

const SET2 = [
  {id:'s2_1',set:2,mode:'exec',text:'Wyświetl <strong>tytuły i oceny</strong> wszystkich filmów, od najwyższej do najniższej.',tables:['FILMY'],tags:['order'],hint:"ORDER BY ocena DESC",answer:`SELECT tytul, ocena FROM filmy ORDER BY ocena DESC`,primarySolution:`SELECT tytul, ocena FROM filmy ORDER BY ocena DESC;`},
  {id:'s2_2',set:2,mode:'exec',text:'Wyświetl <strong>unikalne gatunki filmów</strong>, posortowane alfabetycznie.',tables:['FILMY'],tags:['order'],hint:"DISTINCT",answer:`SELECT DISTINCT gatunek FROM filmy ORDER BY gatunek`,primarySolution:`SELECT DISTINCT gatunek FROM filmy ORDER BY gatunek;`},
  {id:'s2_3',set:2,mode:'exec',text:'Wyświetl <strong>czarne telefony</strong> w cenie 500–2500 zł.',tables:['TELEFONY'],tags:['where'],hint:"BETWEEN",answer:`SELECT marka, model, cena FROM telefony WHERE kolor='black' AND cena BETWEEN 500 AND 2500 ORDER BY cena`,primarySolution:`SELECT marka, model, cena FROM telefony WHERE kolor='black' AND cena BETWEEN 500 AND 2500 ORDER BY cena;`},
  {id:'s2_4',set:2,mode:'exec',text:'Wyświetl telefony, których marka nie należy do Apple, Samsung i Microsoft.',tables:['TELEFONY'],tags:['where'],hint:"NOT IN",answer:`SELECT marka, model, cena FROM telefony WHERE marka NOT IN ('Apple','Samsung','Microsoft') ORDER BY marka`,primarySolution:`SELECT marka, model, cena FROM telefony WHERE marka NOT IN ('Apple','Samsung','Microsoft') ORDER BY marka;`},

  {id:'s2_7',set:2,mode:'exec',text:'Policz liczbę filmów, średnią ocenę i sumę budżetów.',tables:['FILMY'],tags:['agg'],hint:"COUNT, AVG, SUM",answer:`SELECT COUNT(*) AS liczba_filmow, ROUND(AVG(ocena),2) AS srednia_ocena, SUM(budzet_mln) AS suma_budzetow FROM filmy`,primarySolution:`SELECT COUNT(*) as liczba_filmow, ROUND(AVG(ocena),2) as srednia_ocena, SUM(budzet_mln) as suma_budzetow FROM filmy;`},

  {id:'s2_9',set:2,mode:'exec',text:'Wyświetl pełne imię i nazwisko każdego kierowcy w kolumnie "Kierowca".',tables:['KIEROWCY'],tags:['text'],hint:"|| konkatenacja",answer:`SELECT first_name || ' ' || family_name AS Kierowca FROM kierowcy ORDER BY family_name`,primarySolution:`SELECT first_name || ' ' || family_name AS Kierowca FROM kierowcy ORDER BY family_name;`},
  {id:'s2_10',set:2,mode:'exec',text:'Wyświetl tytuły filmów z belgijskich lub hiszpańskich wytwórni.',tables:['FILMY','WYTWORNIE','KRAJE'],tags:['join','where'],hint:"JOIN, IN ('Belgia','Hiszpania')",answer:`SELECT filmy.tytul FROM filmy JOIN wytwornie ON filmy.wytwornia=wytwornie.wytwornia_id JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju IN ('Belgia','Hiszpania') ORDER BY filmy.tytul`,primarySolution:`SELECT filmy.tytul FROM filmy JOIN wytwornie ON filmy.wytwornia=wytwornie.wytwornia_id JOIN kraje ON wytwornie.kraj=kraje.id_kraju WHERE kraje.nazwa_kraju IN ('Belgia','Hiszpania') ORDER BY filmy.tytul;`}
];

const ALL_QUESTIONS = [...SET1, ...SET2];

// ============================================================
// GŁÓWNA APLIKACJA
// ============================================================
let db = null;
let currentSet = 1;
let state = { current:0, answered:{}, showSchema:false, showExpected:false, showHint:false, showSolution:false, userInput:'', done:false, attemptHistory:{} };

function getQuestions(){ return ALL_QUESTIONS.filter(q=>q.set===currentSet); }

function saveProgress(){
  try{
    const toSave = { 
      currentSet: currentSet, 
      current: state.current,
      answered: state.answered,
      done: state.done,
      attemptHistory: state.attemptHistory
    };
    localStorage.setItem('sql_testownik', JSON.stringify(toSave));
    console.log('Zapisano postęp:', toSave);
  }catch(e){ console.error('Błąd zapisu:', e); }
}

function loadProgress(){
  try{
    const saved = localStorage.getItem('sql_testownik');
    if(saved){
      const data = JSON.parse(saved);
      currentSet = data.currentSet || 1;
      state.current = data.current || 0;
      state.answered = data.answered || {};
      state.done = data.done || false;
      state.attemptHistory = data.attemptHistory || {};
      
      // Aktualizacja przycisków zestawów
      const btn1 = document.getElementById('btn-set1');
      const btn2 = document.getElementById('btn-set2');
      if(btn1) btn1.className = 'set-btn' + (currentSet === 1 ? ' active' : '');
      if(btn2) btn2.className = 'set-btn' + (currentSet === 2 ? ' active' : '');
      
      console.log('Wczytano postęp:', {currentSet, current: state.current, answeredCount: Object.keys(state.answered).length});
    }
  }catch(e){ console.error('Błąd wczytywania:', e); }
}

function resetAllProgress(){
  if(confirm('⚠️ Czy na pewno chcesz zresetować cały postęp? Wszystkie odpowiedzi zostaną usunięte.')){
    localStorage.removeItem('sql_testownik');
    state = { current:0, answered:{}, showSchema:false, showExpected:false, showHint:false, showSolution:false, userInput:'', done:false, attemptHistory:{} };
    render();
  }
}

function runQuery(sql){
  try{
    const results = db.exec(sql);
    if(!results.length) return {ok:true,rows:[],cols:[]};
    const {columns,values} = results[0];
    return {ok:true,cols:columns,rows:values};
  }catch(e){ return {ok:false,error:e.message}; }
}

// Inteligentne porównanie WYNIKÓW (tylko dane, nie nazwy kolumn)
function compareResults(userSQL, answerSQL){
  const expected = runQuery(answerSQL);
  if(!expected.ok) return {ok:false,error:'Błąd wzorcowego zapytania: '+expected.error};
  const actual = runQuery(userSQL);
  if(!actual.ok) return {ok:false,error:actual.error};
  
  // Porównujemy tylko wartości wierszy
  const normalizeRows = (rows) => rows.map(row => row.map(cell => cell === null ? null : String(cell).trim()));
  const actualRows = normalizeRows(actual.rows);
  const expectedRows = normalizeRows(expected.rows);
  
  const same = JSON.stringify(actualRows) === JSON.stringify(expectedRows);
  
  if(same) return {ok:true,actual,expected};
  return {ok:false,actual,expected,mismatch:true};
}

function normText(s){ return s.replace(/\s+/g,' ').trim().toLowerCase().replace(/['"]/g,"'").replace(/;$/,''); }
function checkText(user, solutions){ return solutions.some(s=>normText(s)===normText(user)); }

function schemaHTML(names){
  if(!names.length) return '';
  return names.map(n=>{ 
    const t=SCHEMA_DEFS[n.toUpperCase()]; 
    if(!t) return ''; 
    return `<div><div class="s-tbl-name">📋 ${n}</div>${t.cols.map(c=>`<div class="s-col"><span class="cn">${c.name}</span> <span style="color:var(--text3)">${c.type}</span>${c.pk?' 🔑':''}</div>`).join('')}</div>`;
  }).join('');
}

function tableHTML(cols,rows){
  if(!cols||!cols.length) return '<em style="color:var(--text3)">Brak wyników</em>';
  const header=cols.map(c=>`<th>${c}</th>`).join('');
  const body=rows.map(r=>`<tr>${r.map(v=>`<td>${v===null?'NULL':v}</td>`).join('')}</tr>`).join('');
  return `<div style="overflow-x:auto"><table class="result-table"><thead><tr>${header}</thead><tbody>${body}</tbody></table></div>`;
}

const TAG_MAP={join:'t-join',where:'t-where',order:'t-order',group:'t-group',agg:'t-agg',left:'t-left'};
function tagsHTML(tags){ return tags.map(t=>`<span class="tag ${TAG_MAP[t]||'t-where'}">${t.toUpperCase()}</span>`).join(''); }

function render(){
  const app = document.getElementById('app');
  const qs = getQuestions();
  
  if(state.done){
    const correct = Object.values(state.answered).filter(a=>a && a.correct).length;
    const totalAttempts = Object.values(state.attemptHistory).reduce((a,b)=>a+b,0);
    app.innerHTML = `
      <div class="hdr"><h1>SQL <span class="hl">Testownik</span></h1><div class="hdr-sub">// inteligentne porównanie wyników</div></div>
      <div class="summary"><h2>🎉 Gotowe!</h2><span class="score-big">${correct}/${qs.length}</span><p class="summary-msg">${Math.round(correct/qs.length*100)}% poprawnych</p><p class="summary-detail">Łącznie prób: ${totalAttempts}</p><button class="btn-restart" onclick="restart()">Zacznij od nowa</button><button class="btn-restart" style="background:var(--red);margin-left:1rem" onclick="resetAllProgress()">🗑️ Resetuj postęp</button></div>`;
    return;
  }
  
  const q = qs[state.current];
  const ans = state.answered[q.id];
  const progress = (state.current/qs.length)*100;
  const correct = Object.values(state.answered).filter(a=>a && a.correct).length;
  const wrong = Object.values(state.answered).filter(a=>a && !a.correct).length;
  const attempts = state.attemptHistory[q.id] || 0;
  
  const dots = qs.map((qq,i)=>{ const a=state.answered[qq.id]; const cls=a?(a.correct?'ok':'fail'):(i===state.current?'current':''); return `<div class="dot ${cls}" onclick="jumpTo(${i})" title="Pytanie ${i+1}"></div>`; }).join('');
  
  const schemaSection = q.tables.length ? `<button class="schema-btn" onclick="toggle('showSchema')">${state.showSchema?'▲ Ukryj schemat':'▼ Schemat tabel'}</button>${state.showSchema?`<div class="schema"><div class="schema-grid">${schemaHTML(q.tables)}</div></div>`:''}` : '';
  
  const expectedSection = (q.mode==='exec' && db) ? `<button class="expected-btn" onclick="toggle('showExpected')">${state.showExpected?'▲ Ukryj wynik':'▼ Oczekiwany wynik'}</button>${state.showExpected?`<div class="expected-box"><h5>📋 Oczekiwany wynik</h5>${tableHTML(runQuery(q.answer).cols,runQuery(q.answer).rows)}</div>`:''}` : '';
  
  let feedbackSection = '';
  if(ans){
    if(ans.correct){
      feedbackSection = `<div class="feedback ok"><span class="fb-label">✓ Poprawnie! (próba ${attempts+1})</span>${ans.result?`<div class="your-result"><h5>📊 Twój wynik</h5>${tableHTML(ans.result.cols,ans.result.rows)}</div>`:''}</div>`;
    } else {
      let content = `<span class="fb-label">✗ Niepoprawnie (próba ${attempts+1})</span>`;
      if(ans.error) content += `<div class="fb-detail">❌ Błąd SQL: <code>${ans.error}</code></div>`;
      else if(ans.mismatch && ans.actual){
        content += `<div class="your-result fail"><h5>📊 Twój wynik</h5>${tableHTML(ans.actual.cols,ans.actual.rows)}</div>`;
        content += `<div class="fb-detail">💡 Wskazówka: Sprawdź czy liczba wierszy i wartości są zgodne z oczekiwanymi.</div>`;
      }
      content += `<div style="margin-top:.6rem"><button class="tool-btn" style="background:transparent;border:1px solid var(--yellow);color:var(--yellow);padding:.3rem .8rem;border-radius:6px;cursor:pointer" onclick="toggle('showSolution')">🔍 Pokaż rozwiązanie</button>${state.showSolution?`<div class="solution-content"><code>${q.primarySolution}</code></div>`:''}</div>`;
      feedbackSection = `<div class="feedback fail">${content}</div>`;
    }
  }
  
  const hintSection = state.showHint ? `<div class="hint-box">💡 ${q.hint}</div>` : '';
  const modeBadge = q.mode==='exec' ? '<span class="tag t-agg">⚡ SQL</span>' : '<span class="tag t-where">📝 TEKST</span>';
  const isReadonly = ans && ans.correct;
  
  app.innerHTML = `
    <div class="hdr">
      <h1>SQL <span class="hl">Testownik</span></h1>
      <div class="hdr-sub">// inteligentne porównanie wyników · akceptuje każdy poprawny SQL</div>
      <div class="set-switcher">
        <button class="set-btn ${currentSet===1?'active':''}" id="btn-set1" onclick="switchSet(1)">Zestaw 1</button>
        <button class="set-btn ${currentSet===2?'active':''}" id="btn-set2" onclick="switchSet(2)">Zestaw 2</button>
        <button class="reset-progress" onclick="resetAllProgress()">🗑️ Resetuj postęp</button>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-meta"><span>Pytanie ${state.current+1} z ${qs.length}</span><span>${correct} ✓ ${wrong} ✗</span></div><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div></div>
    <div class="stats"><div class="stat"><strong class="pro">${state.current+1}/${qs.length}</strong>postęp</div><div class="stat"><strong class="good">${correct}</strong>✔</div><div class="stat"><strong class="bad">${wrong}</strong>✘</div><div class="stat"><strong class="attempts">${attempts}</strong>próby</div></div>
    <div class="nav-dots">${dots}</div>
    <div class="card">
      <div class="q-meta"><span class="q-num">Pytanie ${state.current+1}</span><div class="q-tags">${modeBadge} ${tagsHTML(q.tags)}</div></div>
      <div class="q-text">${q.text}</div>
      ${schemaSection}
      ${expectedSection}
      <textarea class="sql-editor" id="sqlInput" placeholder="SELECT ..." ${isReadonly?'readonly':''} onkeydown="handleKey(event)">${ans ? ans.value : state.userInput}</textarea>
      ${hintSection}
      ${feedbackSection}
      <div class="actions">
        ${!ans || !ans.correct ? `<button class="btn btn-primary" onclick="check()">Sprawdź ↵</button><button class="btn btn-skip" onclick="skip()">Pomiń</button><button class="btn-hint" onclick="toggle('showHint')">💡 podpowiedź</button>${ans && !ans.correct ? `<button class="btn btn-retry" onclick="retryQuestion()">🔄 Spróbuj ponownie</button>` : ''}` : `<button class="btn btn-next" onclick="next()">${state.current<qs.length-1?'Następne →':'Zobacz wyniki →'}</button>`}
      </div>
    </div>`;
  
  if(!isReadonly){ const ta=document.getElementById('sqlInput'); if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);} }
}

function toggle(key){ const ta=document.getElementById('sqlInput'); if(ta) state.userInput=ta.value; state[key]=!state[key]; render(); }
function jumpTo(i){ const ta=document.getElementById('sqlInput'); if(ta) state.userInput=ta.value; state.current=i; state.showSchema=false; state.showExpected=false; state.showHint=false; state.showSolution=false; render(); saveProgress(); }
function retryQuestion(){ const q=getQuestions()[state.current]; delete state.answered[q.id]; state.showSolution=false; state.userInput=''; render(); }

function check(){
  const ta=document.getElementById('sqlInput');
  const val=ta?ta.value.trim():'';
  if(!val) return;
  const q=getQuestions()[state.current];
  state.attemptHistory[q.id] = (state.attemptHistory[q.id] || 0) + 1;
  
  if(q.mode==='text'){
    const ok=checkText(val,q.solutions);
    state.answered[q.id]={value:val,correct:ok};
  } else {
    const res=compareResults(val,q.answer);
    if(res.ok) state.answered[q.id]={value:val,correct:true,result:res.actual};
    else if(res.mismatch) state.answered[q.id]={value:val,correct:false,mismatch:true,actual:res.actual};
    else state.answered[q.id]={value:val,correct:false,error:res.error};
  }
  saveProgress();
  render();
}

function skip(){ const q=getQuestions()[state.current]; state.answered[q.id]={value:'',correct:false,skipped:true}; saveProgress(); next(); }
function next(){ state.showHint=false;state.showExpected=false;state.showSchema=false;state.showSolution=false;state.userInput=''; const qs=getQuestions(); if(state.current<qs.length-1){state.current++;render();}else{state.done=true;render();} saveProgress(); }
function handleKey(e){ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();check();} }
function restart(){ state={current:0,answered:{},showSchema:false,showExpected:false,showHint:false,showSolution:false,userInput:'',done:false,attemptHistory:{}}; saveProgress(); render(); }
function switchSet(n){ 
  currentSet = n; 
  saveProgress();
  // Odśwież przyciski
  const btn1 = document.getElementById('btn-set1');
  const btn2 = document.getElementById('btn-set2');
  if(btn1) btn1.className = 'set-btn' + (n === 1 ? ' active' : '');
  if(btn2) btn2.className = 'set-btn' + (n === 2 ? ' active' : '');
  // Załaduj zapisany stan dla tego zestawu
  loadProgress();
  render();
}

window.addEventListener('DOMContentLoaded', ()=>{
  initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` }).then(SQL=>{
    db = new SQL.Database();
    db.run(DB_INIT);
    loadProgress();
    render();
  }).catch(e=>{ document.getElementById('app').innerHTML=`<div class="loading"><div class="spinner"></div><p>Błąd: ${e.message}</p></div>`; });
});
</script>
