<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Testownik</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#141420;--bg4:#1a1a2a;
  --border:#252535;--border2:#353550;
  --text:#f0f0ff;--text2:#8888aa;--text3:#444466;
  --acc:#6c63ff;--acc2:#9d97ff;--acc3:#c4c0ff;
  --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;--cyan:#00d2ff;
  --mono:'JetBrains Mono',monospace;--display:'Unbounded',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden}

/* NOISE OVERLAY */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

.app{max-width:900px;margin:0 auto;padding:2rem 1.2rem 5rem;position:relative;z-index:1}

/* HEADER */
.hdr{margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.hdr h1{font-family:var(--display);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;letter-spacing:-0.04em;line-height:1.1}
.hdr h1 .hl{color:var(--acc2)}
.hdr-sub{font-size:0.72rem;color:var(--text3);margin-top:.6rem;letter-spacing:.12em;text-transform:uppercase}
.set-switcher{display:flex;gap:.4rem;flex-shrink:0}
.set-btn{font-family:var(--display);font-size:.65rem;font-weight:700;padding:.4rem .9rem;border-radius:6px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:.15s;letter-spacing:.04em;text-transform:uppercase}
.set-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.set-btn:hover:not(.active){border-color:var(--acc);color:var(--acc2)}

/* PROGRESS */
.progress-wrap{margin-bottom:2rem}
.progress-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text3);margin-bottom:.5rem;letter-spacing:.06em}
.progress-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyan));transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:2px}

/* STATS ROW */
.stats{display:flex;gap:.7rem;margin-bottom:2rem;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;font-size:.72rem;color:var(--text2);display:flex;flex-direction:column;gap:.1rem}
.stat strong{font-size:1.3rem;font-family:var(--display);font-weight:700;display:block}
.stat strong.g{color:var(--green)}
.stat strong.r{color:var(--red)}
.stat strong.a{color:var(--acc2)}
.stat strong.y{color:var(--yellow)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.6rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.3}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.q-num{font-size:.65rem;color:var(--text3);letter-spacing:.15em;text-transform:uppercase}
.q-tags{display:flex;gap:.35rem;flex-wrap:wrap}
.tag{font-size:.6rem;padding:.18rem .5rem;border-radius:4px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
.t-join{background:rgba(108,99,255,.15);color:var(--acc2)}
.t-where{background:rgba(46,204,113,.12);color:var(--green)}
.t-order{background:rgba(243,156,18,.12);color:var(--yellow)}
.t-group{background:rgba(231,76,60,.12);color:var(--red)}
.t-agg{background:rgba(0,210,255,.12);color:var(--cyan)}
.t-limit{background:rgba(136,136,170,.15);color:var(--text2)}
.t-left{background:rgba(255,150,50,.12);color:#ff9632}
.t-text{background:rgba(200,100,255,.12);color:#c864ff}
.t-case{background:rgba(255,80,120,.12);color:#ff5080}
.t-set{background:rgba(50,200,150,.12);color:#32c896}
.t-trans{background:rgba(255,200,0,.12);color:#ffc800}

.q-text{font-size:.95rem;line-height:1.7;color:var(--text);margin-bottom:1.3rem}
.q-text strong{color:var(--acc3);font-weight:700}

/* SCHEMA */
.schema-btn{font-size:.7rem;color:var(--acc);border:1px solid var(--border2);background:transparent;border-radius:6px;padding:.28rem .7rem;cursor:pointer;margin-bottom:1rem;display:inline-flex;align-items:center;gap:.35rem;transition:.15s;font-family:var(--mono)}
.schema-btn:hover{border-color:var(--acc);background:rgba(108,99,255,.08)}
.schema{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.2rem;font-size:.74rem}
.schema-grid{display:flex;gap:1.5rem;flex-wrap:wrap}
.s-tbl-name{color:var(--acc2);font-weight:700;font-size:.8rem;margin-bottom:.4rem;font-family:var(--display);font-size:.7rem;letter-spacing:.04em}
.s-col{padding:.13rem 0;border-bottom:1px solid var(--border);color:var(--text2)}
.s-col:last-child{border-bottom:none}
.s-col .cn{color:var(--text)}
.s-col .pk{color:var(--yellow);font-size:.6rem;margin-left:.3rem}
.s-col .fk{color:var(--green);font-size:.6rem;margin-left:.3rem}

/* EXPECTED */
.expected-btn{font-size:.7rem;color:var(--text3);border:1px solid var(--border);background:transparent;border-radius:6px;padding:.28rem .7rem;cursor:pointer;margin-bottom:1rem;display:inline-flex;align-items:center;gap:.35rem;transition:.15s;font-family:var(--mono);margin-left:.5rem}
.expected-btn:hover{border-color:var(--yellow);color:var(--yellow)}
.expected-box{background:var(--bg3);border:1px solid rgba(243,156,18,.25);border-radius:10px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto}
.expected-box h5{font-size:.65rem;color:var(--yellow);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.6rem}
.result-table{border-collapse:collapse;font-size:.75rem;white-space:nowrap;width:100%}
.result-table th{background:rgba(243,156,18,.1);color:var(--yellow);padding:.3rem .6rem;text-align:left;border:1px solid rgba(243,156,18,.2);font-size:.65rem;text-transform:uppercase;letter-spacing:.06em}
.result-table td{padding:.28rem .6rem;border:1px solid var(--border);color:var(--text2)}
.result-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.null-val{color:var(--text3);font-style:italic}

/* EDITOR */
.editor-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.sql-editor{width:100%;min-height:90px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1rem;font-family:var(--mono);font-size:.85rem;color:var(--text);resize:vertical;outline:none;line-height:1.75;transition:border-color .2s;tab-size:2}
.sql-editor:focus{border-color:var(--acc)}
.sql-editor.ok{border-color:var(--green)}
.sql-editor.fail{border-color:var(--red)}

/* HINT */
.hint-box{background:rgba(243,156,18,.05);border:1px solid rgba(243,156,18,.2);border-radius:8px;padding:.7rem 1rem;margin-top:.8rem;font-size:.78rem;color:var(--yellow);line-height:1.65}

/* FEEDBACK */
.feedback{margin-top:1rem;border-radius:10px;padding:1rem 1.2rem;font-size:.8rem;line-height:1.65}
.feedback.ok{background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.22);color:var(--green)}
.feedback.fail{background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.22);color:var(--red)}
.feedback .fb-label{font-weight:700;font-size:.85rem;margin-bottom:.4rem;display:block;font-family:var(--display);letter-spacing:.02em}
.feedback .fb-detail{color:var(--text2);margin-top:.5rem;font-size:.76rem}
.feedback .fb-detail code{color:var(--text);background:var(--bg3);padding:.1rem .3rem;border-radius:3px}
.solution-toggle{background:transparent;border:1px solid var(--yellow);color:var(--yellow);border-radius:6px;padding:.3rem .8rem;cursor:pointer;font-size:.7rem;margin-top:.6rem;font-family:var(--mono);transition:.15s}
.solution-toggle:hover{background:rgba(243,156,18,.1)}
.solution-content{background:var(--bg3);border-radius:8px;padding:.8rem;margin-top:.5rem;font-size:.78rem;overflow-x:auto}

/* YOUR RESULT TABLE */
.your-result{margin-top:.8rem}
.your-result h5{font-size:.65rem;color:var(--green);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.your-result.fail h5{color:var(--red)}
.result-scroll{overflow-x:auto}

/* ACTIONS */
.actions{display:flex;gap:.7rem;margin-top:1.1rem;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--display);font-weight:700;font-size:.72rem;border:none;border-radius:8px;padding:.55rem 1.2rem;cursor:pointer;transition:.15s;letter-spacing:.04em;text-transform:uppercase}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2);transform:translateY(-1px)}
.btn-skip{background:transparent;color:var(--text3);border:1px solid var(--border);font-size:.68rem}
.btn-skip:hover{color:var(--text2);border-color:var(--border2)}
.btn-hint{background:transparent;color:var(--text3);border:none;font-size:.7rem;cursor:pointer;font-family:var(--mono);margin-left:auto}
.btn-hint:hover{color:var(--yellow)}
.btn-next{background:var(--acc);color:#fff}
.btn-next:hover{background:var(--acc2)}
.btn-retry{background:transparent;color:var(--yellow);border:1px solid var(--yellow);font-size:.68rem}
.btn-retry:hover{background:rgba(243,156,18,.1)}

/* SUMMARY */
.summary{text-align:center;padding:3rem 1rem}
.summary h2{font-family:var(--display);font-size:2rem;font-weight:900;letter-spacing:-.04em;margin-bottom:1rem}
.score-big{font-family:var(--display);font-size:4.5rem;font-weight:900;color:var(--acc2);display:block;line-height:1;margin:1rem 0}
.summary-msg{color:var(--text2);font-size:.82rem;margin-bottom:.5rem}
.summary-detail{color:var(--text3);font-size:.72rem;margin-bottom:2rem}
.btn-restart{font-family:var(--display);font-size:.78rem;font-weight:700;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:.8rem 2rem;cursor:pointer;text-transform:uppercase;letter-spacing:.06em}
.btn-restart:hover{background:var(--acc2)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem}
.loading p{color:var(--text2);font-size:.82rem;letter-spacing:.1em;text-transform:uppercase}
.spinner{width:40px;height:40px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAV DOTS */
.nav-dots{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:1.5rem}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:.2s;flex-shrink:0}
.dot.done-ok{background:var(--green)}
.dot.done-fail{background:var(--red)}
.dot.current{background:var(--acc);transform:scale(1.4)}
.dot:hover{transform:scale(1.3)}

@media(max-width:580px){
  .schema-grid{flex-direction:column}
  .hdr h1{font-size:1.5rem}
  .set-switcher{width:100%}
  .set-btn{flex:1;text-align:center}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-top">
      <div>
        <h1>SQL<br><span class="hl">Testownik</span></h1>
        <div class="hdr-sub">// bazy danych · kwerendy · sqlite</div>
      </div>
      <div class="set-switcher">
        <button class="set-btn active" id="btn-set1" onclick="switchSet(1)">Zestaw 1</button>
        <button class="set-btn" id="btn-set2" onclick="switchSet(2)">Zestaw 2</button>
      </div>
    </div>
  </div>
  <div id="root"><div class="loading"><div class="spinner"></div><p>Ładowanie silnika SQL...</p></div></div>
</div>

<script>
// ─── SCHEMA DEFINITIONS ────────────────────────────────────────────
const SCHEMA_DEFS = {

  ]},
  WYTWORNIE:{cols:[

  ]},

  ]},

    {name:'kod',type:'TEXT'},
    {name:'kraj',type:'TEXT'}
  ]},
  ZAMOWIENIA:{cols:[
    {name:'id_zamowienia',type:'INTEGER',pk:true},
    {name:'id_klienta',type:'INTEGER',fk:'KLIENCI.id_klienta'},

    {name:'data_zamowienia',type:'TEXT'},

  ]},

    {name:'first_name',type:'TEXT',nn:true},
    {name:'family_name',type:'TEXT',nn:true}
  ]},
  FILMY_ARCHIWUM:{cols:[
    {name:'tytul',type:'TEXT'},
    {name:'gatunek',type:'TEXT'}
  ]}
};

// ─── DB INIT SQL ────────────────────────────────────────────────────
const DB_INIT = `
PRAGMA foreign_keys = ON;
CREATE TABLE kraje (id_kraju INTEGER PRIMARY KEY, nazwa_kraju TEXT NOT NULL UNIQUE, stolica TEXT, kod CHAR(3) UNIQUE);
CREATE TABLE wytwornie (wytwornia_id INTEGER PRIMARY KEY AUTOINCREMENT, nazwa TEXT NOT NULL UNIQUE, kraj INTEGER NOT NULL, rok_zalozenia INTEGER NOT NULL, FOREIGN KEY (kraj) REFERENCES kraje(id_kraju));
CREATE TABLE filmy (id_filmu INTEGER PRIMARY KEY AUTOINCREMENT, tytul TEXT NOT NULL, gatunek TEXT NOT NULL DEFAULT 'dramat', wytwornia INTEGER NOT NULL, dlugosc_min INTEGER, ocena FLOAT, budzet_mln FLOAT DEFAULT 0, FOREIGN KEY (wytwornia) REFERENCES wytwornie(wytwornia_id));
CREATE TABLE osoby (id_osoby INTEGER PRIMARY KEY AUTOINCREMENT, imie TEXT NOT NULL, nazwisko TEXT NOT NULL, kraj INTEGER NOT NULL, rok_urodzenia INTEGER, FOREIGN KEY (kraj) REFERENCES kraje(id_kraju));
CREATE TABLE klienci (id_klienta INTEGER PRIMARY KEY, nazwa TEXT NOT NULL, adres TEXT, miasto TEXT, kod TEXT, kraj TEXT DEFAULT 'Polska');
CREATE TABLE zamowienia (id_zamowienia INTEGER PRIMARY KEY, id_klienta INTEGER, id_pracownika INTEGER, data_zamowienia TEXT, kod_kuriera INTEGER, wartosc FLOAT);
CREATE TABLE telefony (id INTEGER PRIMARY KEY AUTOINCREMENT, marka TEXT NOT NULL, model TEXT NOT NULL, kolor TEXT, cena FLOAT, ekran FLOAT, ram INTEGER, UNIQUE(marka, model));
CREATE TABLE hasla_testowe (id INTEGER PRIMARY KEY AUTOINCREMENT, login TEXT NOT NULL UNIQUE, haslo TEXT NOT NULL);
CREATE TABLE kierowcy (id INTEGER PRIMARY KEY AUTOINCREMENT, first_name TEXT NOT NULL, family_name TEXT NOT NULL);
CREATE TABLE filmy_archiwum (tytul TEXT, gatunek TEXT);

// ─── QUESTIONS ──────────────────────────────────────────────────────
// SET 1: original kolokwium questions (text-compare mode)
const SET1 = [
  {id:'1a',set:1,mode:'exec',
   text:'Wyświetl tytuły filmów z <strong>belgijskich wytwórni</strong>. Posortuj alfabetycznie.',
   tables:['FILMY','WYTWORNIE','KRAJE'],tags:['join','where','order'],

   tables:[],tags:['trans'],
   hint:'Jedno słowo — anuluje wszystkie zmiany w bieżącej transakcji.',
   solutions:['rollback'],primarySolution:'ROLLBACK'}
];

const ALL_QUESTIONS = [...SET1, ...SET2];

// ─── STATE ──────────────────────────────────────────────────────────
let db = null;
let currentSet = 1;
let state = { current:0, answered:{}, showSchema:false, showExpected:false, showHint:false, showSolution:false, userInput:'', done:false };

function getQuestions(){ return ALL_QUESTIONS.filter(q=>q.set===currentSet); }

// ─── DB UTILS ───────────────────────────────────────────────────────
function runQuery(sql){
  try{
    const results = db.exec(sql);
    if(!results.length) return {ok:true,rows:[],cols:[]};
    const {columns,values} = results[0];
    return {ok:true,cols:columns,rows:values};
  }catch(e){
    return {ok:false,error:e.message};
  }
}

function resultToKey(r){ return JSON.stringify({cols:r.cols.map(c=>c.toLowerCase()),rows:r.rows.map(row=>row.map(v=>v===null?null:String(v)))}); }

function compareResults(userSQL, answerSQL){
  const expected = runQuery(answerSQL);
  if(!expected.ok) return {ok:false,error:'Błąd wzorcowego zapytania: '+expected.error};
  const actual = runQuery(userSQL);
  if(!actual.ok) return {ok:false,error:actual.error};
  if(resultToKey(actual)===resultToKey(expected)) return {ok:true,actual,expected};
  return {ok:false,actual,expected,mismatch:true};
}

// ─── TEXT COMPARE ───────────────────────────────────────────────────
function normText(s){ return s.replace(/\s+/g,' ').trim().toLowerCase().replace(/['"]/g,"'").replace(/\s*=\s*/g,'=').replace(/\s*,\s*/g,',').replace(/\s*\(\s*/g,'(').replace(/\s*\)\s*/g,')').replace(/;$/,'').trim(); }
function checkText(user, solutions){ return solutions.some(s=>normText(s)===normText(user)); }

// ─── RENDER HELPERS ─────────────────────────────────────────────────
function schemaHTML(names){
  if(!names.length) return '';
  return names.map(n=>{
    const t=SCHEMA_DEFS[n.toUpperCase()]; if(!t) return '';
    return `<div><div class="s-tbl-name">${n}</div>${t.cols.map(c=>`<div class="s-col"><span class="cn">${c.name}</span><span style="color:var(--text3)"> · ${c.type}</span>${c.pk?'<span class="pk">PK</span>':''}${c.fk?`<span class="fk">FK→${c.fk}</span>`:''}</div>`).join('')}</div>`;
  }).join('');
}

function tableHTML(cols,rows,cls=''){
  if(!cols||!cols.length) return '<em style="color:var(--text3);font-size:.75rem">Brak wyników</em>';
  const header=cols.map(c=>`<th>${c}</th>`).join('');
  const body=rows.map(r=>`<tr>${r.map(v=>`<td>${v===null?'<span class="null-val">NULL</span>':v}</td>`).join('')}</tr>`).join('');
  return `<div class="result-scroll"><table class="result-table ${cls}"><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table></div>`;
}

const TAG_MAP={join:'t-join',where:'t-where',order:'t-order',group:'t-group',agg:'t-agg',limit:'t-limit',left:'t-left',text:'t-text',case:'t-case',set:'t-set',trans:'t-trans'};
const TAG_LABEL={join:'INNER JOIN',where:'WHERE',order:'ORDER BY',group:'GROUP BY',agg:'AGG',limit:'LIMIT',left:'LEFT JOIN',text:'FUNC',case:'CASE',set:'INTERSECT',trans:'TRANSACTION'};
function tagsHTML(tags){ return tags.map(t=>`<span class="tag ${TAG_MAP[t]||'t-where'}">${TAG_LABEL[t]||t.toUpperCase()}</span>`).join(''); }

// ─── MAIN RENDER ────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  const qs=getQuestions();
  if(state.done){
    const correct=Object.values(state.answered).filter(a=>a.correct).length;
    const pct=Math.round(correct/qs.length*100);
    root.innerHTML=`<div class="summary">
      <h2>Gotowe! 🎉</h2>
      <span class="score-big">${correct}/${qs.length}</span>
      <p class="summary-msg">${pct}% poprawnych odpowiedzi</p>
      <p class="summary-detail">${pct>=80?'Świetny wynik! Jesteś gotowy na kolokwium.':pct>=60?'Nieźle! Poćwicz jeszcze trochę.':'Wróć do materiałów i spróbuj ponownie.'}</p>
      <button class="btn-restart" onclick="restart()">Zacznij od nowa</button>
    </div>`;
    return;
  }
  const q=qs[state.current];
  const ans=state.answered[q.id];
  const progress=(state.current/qs.length)*100;
  const correct=Object.values(state.answered).filter(a=>a.correct).length;
  const wrong=Object.values(state.answered).filter(a=>!a.correct).length;

  // dots
  const dots=qs.map((qq,i)=>{
    const a=state.answered[qq.id];
    const cls=a?(a.correct?'done-ok':'done-fail'):(i===state.current?'current':'');
    return `<div class="dot ${cls}" onclick="jumpTo(${i})" title="Pytanie ${i+1}"></div>`;
  }).join('');

  // schema
  const schemaSection=q.tables.length?`
    <button class="schema-btn" onclick="toggle('showSchema')">${state.showSchema?'▲ Ukryj schemat':'▼ Schemat tabel'}</button>
    ${state.showSchema?`<div class="schema"><div class="schema-grid">${schemaHTML(q.tables)}</div></div>`:''}
  `:'';

  // expected (set 2 only)
  let expectedSection='';
  if(q.mode==='exec' && db){
    const expRes=runQuery(q.answer);
    expectedSection=`
      <button class="expected-btn" onclick="toggle('showExpected')">${state.showExpected?'▲ Ukryj oczekiwany wynik':'▼ Oczekiwany wynik'}</button>
      ${state.showExpected?`<div class="expected-box"><h5>Oczekiwany wynik (${expRes.rows.length} wierszy)</h5>${tableHTML(expRes.cols,expRes.rows)}</div>`:''}
    `;
  }

  // feedback
  let feedbackSection='';
  if(ans){
    if(ans.correct){
      let content=`<span class="fb-label">✓ Poprawnie!</span>`;
      if(ans.result){
        content+=`<div class="your-result"><h5>Twój wynik (${ans.result.rows.length} wierszy)</h5>${tableHTML(ans.result.cols,ans.result.rows)}</div>`;
      }
      feedbackSection=`<div class="feedback ok">${content}</div>`;
    } else {
      let content=`<span class="fb-label">✗ Niepoprawnie</span>`;
      if(ans.error){
        content+=`<div class="fb-detail">Błąd SQL: <code>${ans.error.replace(/</g,'&lt;')}</code></div>`;
      } else if(ans.mismatch && ans.result){
        content+=`<div class="your-result fail"><h5>Twój wynik (${ans.result.rows.length} wierszy)</h5>${tableHTML(ans.result.cols,ans.result.rows)}</div>`;
      }
      
      // Zakryte rozwiązanie - przycisk do pokazania
      content+=`<div class="fb-detail" style="margin-top:.6rem">
        <button class="solution-toggle" onclick="toggleSolution()">🔍 Pokaż przykładowe rozwiązanie</button>
        ${state.showSolution ? `<div class="solution-content"><code style="white-space:pre;display:block;line-height:1.6">${q.primarySolution.replace(/</g,'&lt;')}</code></div>` : ''}
      </div>`;
      
      feedbackSection=`<div class="feedback fail">${content}</div>`;
    }
  }

  const hintSection=state.showHint?`<div class="hint-box">💡 ${q.hint}</div>`:'';
  const modeBadge=q.mode==='exec'?'<span class="tag t-agg" style="font-size:.6rem">⚡ WYKONYWALNE</span>':'<span class="tag t-where" style="font-size:.6rem">📝 TEKSTOWE</span>';

  // Edytor: tylko czyta jeśli odpowiedź jest poprawna, ale jeśli błędna - można edytować
  const isReadonly = ans && ans.correct;
  const editorClass = ans ? (ans.correct ? 'ok' : 'fail') : '';

  root.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-meta"><span>Pytanie ${state.current+1} z ${qs.length}</span><span>${correct} ✓  ${wrong} ✗</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="stats">
      <div class="stat"><strong class="a">${state.current+1}/${qs.length}</strong>postęp</div>
      <div class="stat"><strong class="g">${correct}</strong>poprawne</div>
      <div class="stat"><strong class="r">${wrong}</strong>błędne</div>
      <div class="stat"><strong class="y">${qs.length-state.current-1}</strong>pozostało</div>
    </div>
    <div class="nav-dots">${dots}</div>
    <div class="card">
      <div class="q-meta">
        <span class="q-num">Pytanie ${state.current+1}</span>
        <div class="q-tags">${modeBadge} ${tagsHTML(q.tags)}</div>
      </div>
      <div class="q-text">${q.text}</div>
      ${schemaSection}
      ${expectedSection}
      <div class="editor-label">Twoje zapytanie SQL <span style="color:var(--text3);font-size:.6rem">Ctrl+Enter = sprawdź</span></div>
      <textarea class="sql-editor ${editorClass}" id="sqlInput"
        placeholder="SELECT ..."
        ${isReadonly ? 'readonly' : ''}
        onkeydown="handleKey(event)">${ans ? ans.value : state.userInput}</textarea>
      ${hintSection}
      ${feedbackSection}
      <div class="actions">
        ${!ans || !ans.correct
          ?`<button class="btn btn-primary" onclick="check()">Sprawdź ↵</button>
            <button class="btn btn-skip" onclick="skip()">Pomiń →</button>
            <button class="btn-hint" onclick="toggle('showHint')">💡 podpowiedź</button>
            ${ans && !ans.correct ? `<button class="btn btn-retry" onclick="retryQuestion()">🔄 Spróbuj ponownie</button>` : ''}`
          :`<button class="btn btn-next" onclick="next()">${state.current<qs.length-1?'Następne →':'Zobacz wyniki →'}</button>`
        }
      </div>
    </div>`;

  if(!ans || !ans.correct){ const ta=document.getElementById('sqlInput'); if(ta && !isReadonly){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);} }
}

// ─── ACTIONS ────────────────────────────────────────────────────────
function toggle(key){ const ta=document.getElementById('sqlInput'); if(ta) state.userInput=ta.value; state[key]=!state[key]; render(); }
function toggleSolution(){ state.showSolution=!state.showSolution; render(); }
function jumpTo(i){ const ta=document.getElementById('sqlInput'); if(ta) state.userInput=ta.value; state.current=i; state.showSchema=false; state.showExpected=false; state.showHint=false; state.showSolution=false; render(); }
function retryQuestion(){ 
  const q=getQuestions()[state.current];
  delete state.answered[q.id];
  state.showSolution=false;
  state.userInput='';
  render();
}

function check(){
  const ta=document.getElementById('sqlInput');
  const val=ta?ta.value.trim():''; if(!val) return;
  const q=getQuestions()[state.current];
  if(q.mode==='text'){
    const ok=checkText(val,q.solutions);
    state.answered[q.id]={value:val,correct:ok};
  } else {
    const res=compareResults(val,q.answer);
    if(res.ok){
      state.answered[q.id]={value:val,correct:true,result:res.actual};
    } else if(res.mismatch){
      state.answered[q.id]={value:val,correct:false,mismatch:true,result:res.actual};
    } else {
      state.answered[q.id]={value:val,correct:false,error:res.error};
    }
  }
  state.showHint=false;
  state.showSolution=false;
  render();
}

function skip(){ const q=getQuestions()[state.current]; state.answered[q.id]={value:'',correct:false,skipped:true}; next(); }
function next(){ state.showHint=false;state.showExpected=false;state.showSchema=false;state.showSolution=false;state.userInput=''; const qs=getQuestions(); if(state.current<qs.length-1){state.current++;render();}else{state.done=true;render();} }
function handleKey(e){ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();check();} }
function restart(){ state={current:0,answered:{},showSchema:false,showExpected:false,showHint:false,showSolution:false,userInput:'',done:false}; render(); }

function switchSet(n){
  currentSet=n;
  document.getElementById('btn-set1').className='set-btn'+(n===1?' active':'');
  document.getElementById('btn-set2').className='set-btn'+(n===2?' active':'');
  restart();
}

// ─── INIT SQL.JS ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', ()=>{
  if(typeof initSqlJs==='undefined'){
    document.getElementById('root').innerHTML='<div class="loading"><p style="color:var(--red)">Błąd: nie można załadować sql.js. Sprawdź połączenie z internetem.</p></div>';
    return;
  }
  initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` }).then(SQL=>{
    db = new SQL.Database();
    db.run(DB_INIT);
    render();
  }).catch(e=>{
    document.getElementById('root').innerHTML=`<div class="loading"><p style="color:var(--red)">Błąd inicjalizacji: ${e.message}</p></div>`;
  });
});
</script>
</body>
</html>
