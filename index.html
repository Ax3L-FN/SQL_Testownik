<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#141420;
  --border:#252535;--border2:#353550;
  --text:#f0f0ff;--text2:#8888aa;--text3:#444466;
  --acc:#6c63ff;--acc2:#9d97ff;--acc3:#c4c0ff;
  --green:#2ecc71;--red:#e74c3c;--yellow:#f39c12;--cyan:#00d2ff;
  --mono:'JetBrains Mono',monospace;--display:'Unbounded',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
body::before{content:'';position:fixed;inset:0;opacity:.35;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E")}
.app{max-width:900px;margin:0 auto;padding:2rem 1.2rem 5rem;position:relative;z-index:1}

/* HEADER */
.hdr{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.hdr h1{font-family:var(--display);font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;letter-spacing:-.04em}
.hdr h1 .hl{color:var(--acc2)}
.hdr-sub{font-size:.7rem;color:var(--text3);margin-top:.4rem;letter-spacing:.1em;text-transform:uppercase}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.set-switcher{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}
.set-btn{font-family:var(--display);font-size:.6rem;font-weight:700;padding:.38rem .85rem;border-radius:6px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:.15s;text-transform:uppercase;letter-spacing:.04em}
.set-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.set-btn:hover:not(.active){border-color:var(--acc);color:var(--acc2)}
.btn-reset-all{font-family:var(--display);font-size:.6rem;font-weight:700;padding:.38rem .85rem;border-radius:6px;border:1.5px solid var(--red);background:transparent;color:var(--red);cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.btn-reset-all:hover{background:rgba(231,76,60,.12)}

/* PROGRESS */
.progress-wrap{margin-bottom:1.5rem}
.progress-meta{display:flex;justify-content:space-between;font-size:.68rem;color:var(--text3);margin-bottom:.4rem}
.progress-track{height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyan));transition:width .5s;border-radius:3px}

/* STATS */
.stats{display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.4rem .85rem;font-size:.68rem;color:var(--text2)}
.stat strong{font-size:1.1rem;font-family:var(--display);font-weight:700;display:block}
.stat strong.g{color:var(--green)}
.stat strong.r{color:var(--red)}
.stat strong.a{color:var(--acc2)}
.stat strong.c{color:var(--cyan)}

/* NAV DOTS */
.nav-dots{display:flex;gap:.3rem;margin-bottom:1.2rem;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:.2s;flex-shrink:0}
.dot.ok{background:var(--green)}
.dot.fail{background:var(--red)}
.dot.current{background:var(--acc);transform:scale(1.5)}
.dot:hover{opacity:.7}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.3;border-radius:14px 14px 0 0}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:.4rem}
.q-num{font-size:.63rem;color:var(--text3);text-transform:uppercase;letter-spacing:.12em}
.q-tags{display:flex;gap:.3rem;flex-wrap:wrap}
.tag{font-size:.58rem;padding:.15rem .45rem;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.t-join{background:rgba(108,99,255,.15);color:var(--acc2)}
.t-where{background:rgba(46,204,113,.12);color:var(--green)}
.t-order{background:rgba(243,156,18,.12);color:var(--yellow)}
.t-group{background:rgba(231,76,60,.12);color:var(--red)}
.t-agg{background:rgba(0,210,255,.12);color:var(--cyan)}
.t-limit{background:rgba(150,150,180,.12);color:var(--text2)}
.t-left{background:rgba(255,150,50,.12);color:#ff9632}
.t-text{background:rgba(200,100,255,.12);color:#c864ff}
.t-case{background:rgba(255,80,120,.12);color:#ff5080}
.t-set{background:rgba(50,200,150,.12);color:#32c896}
.t-trans{background:rgba(255,200,0,.12);color:#ffc800}
.t-exec{background:rgba(0,210,255,.15);color:var(--cyan)}
.t-kw{background:rgba(46,204,113,.12);color:var(--green)}
.q-text{font-size:.92rem;line-height:1.65;margin-bottom:1.2rem}
.q-text strong{color:var(--acc3);font-weight:700}
.q-text code{background:var(--bg3);padding:.1rem .3rem;border-radius:3px;font-size:.85em}

/* SCHEMA / EXPECTED TOGGLES */
.toggle-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem}
.tgl-btn{font-family:var(--mono);font-size:.68rem;background:transparent;border:1px solid var(--border2);border-radius:6px;padding:.25rem .65rem;cursor:pointer;color:var(--text2);transition:.15s}
.tgl-btn:hover{border-color:var(--acc);color:var(--acc2)}
.schema-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:.9rem}
.schema-grid{display:flex;gap:1.3rem;flex-wrap:wrap}
.s-tbl{min-width:130px}
.s-tbl-name{color:var(--acc2);font-weight:700;font-size:.75rem;margin-bottom:.35rem;font-family:var(--display);letter-spacing:.03em}
.s-col{padding:.1rem 0;border-bottom:1px solid var(--border);font-size:.68rem;color:var(--text2)}
.s-col:last-child{border-bottom:none}
.s-col .cn{color:var(--text)}
.s-col .pk{color:var(--yellow);font-size:.58rem;margin-left:.3rem}
.s-col .fk{color:var(--green);font-size:.58rem;margin-left:.3rem}
.expected-box{background:var(--bg3);border:1px solid rgba(243,156,18,.25);border-radius:10px;padding:.9rem;margin-bottom:.9rem;overflow-x:auto}
.expected-box h5{font-size:.63rem;color:var(--yellow);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}

/* RESULT TABLES */
.result-wrap{overflow-x:auto;margin-top:.5rem}
.result-table{border-collapse:collapse;font-size:.7rem;white-space:nowrap}
.result-table th{background:rgba(108,99,255,.1);color:var(--acc2);padding:.28rem .55rem;border:1px solid var(--border2);font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;text-align:left}
.result-table td{padding:.22rem .55rem;border:1px solid var(--border);color:var(--text2)}
.result-table tr:nth-child(even) td{background:rgba(255,255,255,.015)}
.null-val{color:var(--text3);font-style:italic}

/* EDITOR */
.editor-label{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.35rem}
.sql-editor{width:100%;min-height:95px;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:.85rem 1rem;font-family:var(--mono);font-size:.83rem;color:var(--text);resize:vertical;outline:none;line-height:1.7;transition:border-color .2s}
.sql-editor:focus{border-color:var(--acc)}
.sql-editor.ok{border-color:var(--green)}
.sql-editor.fail{border-color:var(--red)}

/* HINT */
.hint-box{background:rgba(243,156,18,.05);border:1px solid rgba(243,156,18,.2);border-radius:8px;padding:.65rem .9rem;margin-top:.7rem;font-size:.75rem;color:var(--yellow);line-height:1.6}

/* FEEDBACK */
.feedback{margin-top:.9rem;border-radius:10px;padding:.9rem 1.1rem;font-size:.78rem;line-height:1.6}
.feedback.ok{background:rgba(46,204,113,.07);border:1px solid rgba(46,204,113,.22);color:var(--green)}
.feedback.fail{background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.22);color:var(--red)}
.fb-label{font-weight:700;font-size:.82rem;display:block;margin-bottom:.35rem;font-family:var(--display);letter-spacing:.02em}
.fb-detail{color:var(--text2);font-size:.73rem;margin-top:.4rem}
.fb-detail code{color:var(--text);background:var(--bg3);padding:.1rem .28rem;border-radius:3px}
.your-result{margin-top:.7rem}
.your-result h5{font-size:.62rem;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.08em}
.your-result.ok h5{color:var(--green)}
.your-result.fail h5{color:var(--red)}

/* SOLUTION BOX */
.sol-toggle-btn{font-family:var(--mono);font-size:.68rem;background:transparent;border:1px solid rgba(243,156,18,.4);border-radius:6px;padding:.25rem .65rem;cursor:pointer;color:var(--yellow);margin-top:.6rem;display:inline-block;transition:.15s}
.sol-toggle-btn:hover{background:rgba(243,156,18,.08)}
.sol-box{background:var(--bg3);border:1px solid rgba(243,156,18,.2);border-radius:8px;padding:.7rem .9rem;margin-top:.5rem;font-size:.72rem;color:var(--text2);white-space:pre-wrap;line-height:1.65}

/* ACTIONS */
.actions{display:flex;gap:.6rem;margin-top:1rem;flex-wrap:wrap;align-items:center}
.btn{font-family:var(--display);font-weight:700;font-size:.68rem;border:none;border-radius:8px;padding:.5rem 1.1rem;cursor:pointer;transition:.15s;text-transform:uppercase;letter-spacing:.04em}
.btn-primary{background:var(--acc);color:#fff}
.btn-primary:hover{background:var(--acc2);transform:translateY(-1px)}
.btn-skip{background:transparent;color:var(--text3);border:1px solid var(--border);font-size:.65rem}
.btn-skip:hover{color:var(--text2);border-color:var(--border2)}
.btn-retry{background:transparent;color:var(--yellow);border:1px solid var(--yellow);font-size:.65rem}
.btn-retry:hover{background:rgba(243,156,18,.1)}
.btn-next{background:var(--acc);color:#fff}
.btn-next:hover{background:var(--acc2)}
.btn-hint{background:transparent;color:var(--text3);border:none;font-size:.68rem;cursor:pointer;font-family:var(--mono);margin-left:auto}
.btn-hint:hover{color:var(--yellow)}

/* SUMMARY */
.summary{text-align:center;padding:3rem 1rem}
.summary h2{font-family:var(--display);font-size:1.8rem;font-weight:900;letter-spacing:-.04em;margin-bottom:.8rem}
.score-big{font-family:var(--display);font-size:4rem;font-weight:900;color:var(--acc2);display:block;line-height:1;margin:.8rem 0}
.sum-msg{color:var(--text2);font-size:.8rem;margin-bottom:.4rem}
.sum-detail{color:var(--text3);font-size:.7rem;margin-bottom:2rem}
.btn-restart{font-family:var(--display);font-size:.72rem;font-weight:700;background:var(--acc);color:#fff;border:none;border-radius:10px;padding:.7rem 1.8rem;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}
.btn-restart:hover{background:var(--acc2)}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem}
.spinner{width:38px;height:38px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text2);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase}

@media(max-width:580px){.schema-grid{flex-direction:column}.hdr-row{flex-direction:column}}
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────
let db = null;
let curSet = 1;
let S = { cur:0, answered:{}, attempts:{}, showSchema:false, showExpected:false, showHint:false, showSol:false, input:'', done:false };

function qs(){ return Q.filter(q=>q.s===curSet); }

// ─── PERSISTENCE ─────────────────────────────────────────────────────
function save(){
  try{ 
    localStorage.setItem('sqlt2', JSON.stringify({
      curSet: curSet,
      S: {
        cur: S.cur,
        answered: S.answered,
        attempts: S.attempts,
        done: S.done
      }
    })); 
    console.log('✅ Zapisano postęp:', {curSet, answeredCount: Object.keys(S.answered).length});
  } catch(e){ console.error('Błąd zapisu:', e); }
}

function load(){
  try{
    const d = JSON.parse(localStorage.getItem('sqlt2')||'null');
    if(!d) return;
    curSet = d.curSet || 1;
    S.cur = d.S?.cur || 0;
    S.answered = d.S?.answered || {};
    S.attempts = d.S?.attempts || {};
    S.done = d.S?.done || false;
    console.log('📀 Wczytano postęp:', {curSet, answeredCount: Object.keys(S.answered).length});
  } catch(e){ console.error('Błąd wczytywania:', e); }
}

function resetAll(){
  if(!confirm('Zresetować cały postęp?')) return;
  localStorage.removeItem('sqlt2');
  S = {cur:0,answered:{},attempts:{},showSchema:false,showExpected:false,showHint:false,showSol:false,input:'',done:false};
  render();
}

// ─── SQL UTILS ───────────────────────────────────────────────────────
function runQ(sql){
  try{
    const r = db.exec(sql);
    if(!r.length) return {ok:true,cols:[],rows:[]};
    return {ok:true,cols:r[0].columns,rows:r[0].values};
  }catch(e){ return {ok:false,err:e.message}; }
}

// Porównuje tylko wartości (nie nazwy kolumn) — liczy się wynik, nie forma zapytania
function compare(userSql, refSql){
  const ref = runQ(refSql);
  if(!ref.ok) return {ok:false,err:'Błąd wzorca: '+ref.err};
  const usr = runQ(userSql);
  if(!usr.ok) return {ok:false,err:usr.err};
  const norm = rows => JSON.stringify(rows.map(r=>r.map(v=>v===null?null:String(v).trim())));
  if(norm(usr.rows)===norm(ref.rows)) return {ok:true,actual:usr,expected:ref};
  return {ok:false,mismatch:true,actual:usr,expected:ref};
}

function checkText(val, kws){ return kws.includes(val.trim().toLowerCase().replace(/;$/,'').trim()); }

// ─── RENDER HELPERS ──────────────────────────────────────────────────
function schemaHTML(names){
  return names.map(n=>{
    const t=SCHEMA[n.toUpperCase()]; if(!t) return '';
    return `<div class="s-tbl"><div class="s-tbl-name">${n}</div>${t.cols.map(c=>`<div class="s-col"><span class="cn">${c.n}</span> <span style="color:var(--text3)">${c.t}</span>${c.pk?'<span class="pk">PK</span>':''}${c.fk?`<span class="fk">FK→${c.fk}</span>`:''}</div>`).join('')}</div>`;
  }).join('');
}

function tblHTML(cols,rows){
  if(!cols||!cols.length) return '<em style="color:var(--text3);font-size:.72rem">Brak wyników</em>';
  return `<div class="result-wrap"><table class="result-table"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(v=>`<td>${v===null?'<span class="null-val">NULL</span>':v}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

const TAGS={join:'t-join',where:'t-where',order:'t-order',group:'t-group',agg:'t-agg',limit:'t-limit',left:'t-left',text:'t-text',case:'t-case',set:'t-set',trans:'t-trans',kw:'t-kw'};
function tagsHTML(tags){ return tags.map(t=>`<span class="tag ${TAGS[t]||'t-where'}">${t.toUpperCase()}</span>`).join(''); }

// ─── MAIN RENDER ────────────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  const list = qs();

  if(S.done){
    const ok = Object.values(S.answered).filter(a=>a&&a.ok).length;
    const totalTries = Object.values(S.attempts).reduce((a,b)=>a+b,0);
    const pct = Math.round(ok/list.length*100);
    app.innerHTML=`
      <div class="hdr"><div class="hdr-row"><div><h1>SQL <span class="hl">Testownik</span></h1><div class="hdr-sub">// bazy danych · sqlite</div></div></div>
        <div class="set-switcher"><button class="set-btn ${curSet===1?'active':''}" onclick="switchSet(1)">Zestaw 1</button><button class="set-btn ${curSet===2?'active':''}" onclick="switchSet(2)">Zestaw 2</button><button class="btn-reset-all" onclick="resetAll()">Resetuj postęp</button></div>
      </div>
      <div class="summary">
        <h2>🎉 Gotowe!</h2>
        <span class="score-big">${ok}/${list.length}</span>
        <p class="sum-msg">${pct}% poprawnych</p>
        <p class="sum-detail">Łącznie prób: ${totalTries}</p>
        <button class="btn-restart" onclick="restart()">Zacznij od nowa</button>
      </div>`;
    return;
  }

  const q = list[S.cur];
  const ans = S.answered[q.id];
  const prog = (S.cur/list.length)*100;
  const okCount = Object.values(S.answered).filter(a=>a&&a.ok).length;
  const failCount = Object.values(S.answered).filter(a=>a&&!a.ok).length;
  const tries = S.attempts[q.id]||0;

  const dots = list.map((qq,i)=>{
    const a=S.answered[qq.id];
    const cls=a?(a.ok?'ok':'fail'):(i===S.cur?'current':'');
    return `<div class="dot ${cls}" onclick="jumpTo(${i})" title="Pyt. ${i+1}"></div>`;
  }).join('');

  // schema section
  const schemaSection = q.tbls.length ? `
    <div class="toggle-row">
      <button class="tgl-btn" onclick="tog('showSchema')">${S.showSchema?'▲ Ukryj schemat':'▼ Schemat tabel'}</button>
      ${q.mode==='exec'?`<button class="tgl-btn" onclick="tog('showExpected')">${S.showExpected?'▲ Ukryj wynik':'▼ Oczekiwany wynik'}</button>`:''}
    </div>
    ${S.showSchema?`<div class="schema-box"><div class="schema-grid">${schemaHTML(q.tbls)}</div></div>`:''}
    ${S.showExpected&&q.mode==='exec'?`<div class="expected-box"><h5>Oczekiwany wynik</h5>${tblHTML(runQ(q.ans).cols,runQ(q.ans).rows)}</div>`:''}
  ` : '';

  // feedback
  let fb='';
  if(ans){
    if(ans.ok){
      fb=`<div class="feedback ok">
        <span class="fb-label">✓ Poprawnie! (próba ${tries})</span>
        ${ans.actual?`<div class="your-result ok"><h5>Twój wynik</h5>${tblHTML(ans.actual.cols,ans.actual.rows)}</div>`:''}
      </div>`;
    } else {
      let inner=`<span class="fb-label">✗ Niepoprawnie (próba ${tries})</span>`;
      if(ans.err) inner+=`<div class="fb-detail">Błąd SQL: <code>${ans.err.replace(/</g,'&lt;')}</code></div>`;
      else if(ans.actual) inner+=`<div class="your-result fail"><h5>Twój wynik</h5>${tblHTML(ans.actual.cols,ans.actual.rows)}</div>`;
      // rozwiązanie ukryte, pokazuj tylko na żądanie
      inner+=`<button class="sol-toggle-btn" onclick="tog('showSol')">${S.showSol?'▲ Ukryj rozwiązanie':'🔍 Pokaż przykładowe rozwiązanie'}</button>`;
      if(S.showSol) inner+=`<div class="sol-box">${q.sol.replace(/</g,'&lt;')}</div>`;
      fb=`<div class="feedback fail">${inner}</div>`;
    }
  }

  const hint = S.showHint?`<div class="hint-box">💡 ${q.hint}</div>`:'';
  const modeBadge = q.mode==='exec'?'<span class="tag t-exec">⚡ EXEC</span>':'<span class="tag t-kw">📝 TEKST</span>';
  const locked = ans&&ans.ok; // zablokuj edytor tylko po poprawnej odpowiedzi

  app.innerHTML=`
    <div class="hdr">
      <div class="hdr-row">
        <div><h1>SQL <span class="hl">Testownik</span></h1><div class="hdr-sub">// Od CBE dla CBE <3</div></div>
      </div>
      <div class="set-switcher">
        <button class="set-btn ${curSet===1?'active':''}" onclick="switchSet(1)">Zestaw 1 (13)</button>
        <button class="set-btn ${curSet===2?'active':''}" onclick="switchSet(2)">Zestaw 2 (20)</button>
        <button class="btn-reset-all" onclick="resetAll()">Resetuj postęp</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta"><span>Pytanie ${S.cur+1} z ${list.length}</span><span>${okCount} ✓  ${failCount} ✗</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
    </div>
    <div class="stats">
      <div class="stat"><strong class="a">${S.cur+1}/${list.length}</strong>postęp</div>
      <div class="stat"><strong class="g">${okCount}</strong>poprawne</div>
      <div class="stat"><strong class="r">${failCount}</strong>błędne</div>
      <div class="stat"><strong class="c">${tries}</strong>próby</div>
    </div>
    <div class="nav-dots">${dots}</div>
    <div class="card">
      <div class="q-meta">
        <span class="q-num">Pytanie ${S.cur+1}</span>
        <div class="q-tags">${modeBadge} ${tagsHTML(q.tags)}</div>
      </div>
      <div class="q-text">${q.text}</div>
      ${schemaSection}
      <div class="editor-label">Twoje zapytanie &nbsp;<span style="color:var(--text3);font-size:.58rem">Ctrl+Enter = sprawdź</span></div>
      <textarea class="sql-editor${ans?(ans.ok?' ok':' fail'):''}" id="ed"
        placeholder="SELECT ..."
        ${locked?'readonly':''}
        onkeydown="handleKey(event)">${ans?ans.val:S.input}</textarea>
      ${hint}
      ${fb}
      <div class="actions">
        ${locked
          ? `<button class="btn btn-next" onclick="next()">${S.cur<list.length-1?'Następne →':'Zobacz wyniki →'}</button>`
          : `<button class="btn btn-primary" onclick="check()">Sprawdź ↵</button>
             <button class="btn btn-skip" onclick="skip()">Pomiń</button>
             <button class="btn-hint" onclick="tog('showHint')">💡 podpowiedź</button>
             ${ans&&!ans.ok?`<button class="btn btn-retry" onclick="retry()">🔄 Spróbuj ponownie</button>`:''}`
        }
      </div>
    </div>`;

  if(!locked){ const ed=document.getElementById('ed'); if(ed){ed.focus();ed.setSelectionRange(ed.value.length,ed.value.length);} }
}

// ─── ACTIONS ────────────────────────────────────────────────────────
function tog(k){ const ed=document.getElementById('ed'); if(ed) S.input=ed.value; S[k]=!S[k]; render(); }
function jumpTo(i){
  const ta = document.getElementById('sqlInput');
  if(ta) S.input = ta.value;
  S.cur = i;
  S.showSchema = false;
  S.showExpected = false;
  S.showHint = false;
  S.showSol = false;
  save();  
  render();
}
function retry(){ const q=qs()[S.cur]; delete S.answered[q.id]; S.showSol=false; S.input=''; render(); }

function check(){
  const val = document.getElementById('sqlInput')?.value.trim();
  if(!val) return;
  const q = getQuestions()[S.cur];
  S.attempts[q.id] = (S.attempts[q.id]||0)+1;
  
  if(q.mode==='text'){
    S.answered[q.id] = {val, correct: checkText(val, q.solutions)};
  } else {
    const res = compareResults(val, q.answer);
    if(res.ok) S.answered[q.id] = {val, correct: true, result: res.actual};
    else if(res.mismatch) S.answered[q.id] = {val, correct: false, mismatch: true, actual: res.actual};
    else S.answered[q.id] = {val, correct: false, error: res.error};
  }
  
  save();  
  render();
}

function skip(){
  const q = getQuestions()[S.cur];
  S.answered[q.id] = {val: '', correct: false, skipped: true};
  save();  
  next();
}
function next(){
  S.showHint = false;
  S.showExpected = false;
  S.showSchema = false;
  S.showSol = false;
  S.input = '';
  const qs = getQuestions();
  if(S.cur < qs.length-1){
    S.cur++;
    render();
  } else {
    S.done = true;
    render();
  }
  save();  
}
function handleKey(e){ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();check();} }
function restart(){
  S = {cur:0,answered:{},attempts:{},showSchema:false,showExpected:false,showHint:false,showSol:false,input:'',done:false};
  save();  
  render();
}
  
function switchSet(n){
  if(n === curSet) return;
  
  // ZAPISZ bieżący zestaw przed zmianą
  save();
  
  curSet = n;
  
  // Odśwież przyciski
  document.querySelectorAll('.set-btn').forEach((btn,i)=>{
    btn.className = 'set-btn' + ((i+1) === n ? ' active' : '');
  });
  
  // Załaduj stan nowego zestawu
  load();
  
  // Resetuj widoczność elementów UI
  S.showSchema = false;
  S.showExpected = false;
  S.showHint = false;
  S.showSol = false;
  S.input = '';
  
  // Walidacja indeksu
  const qs = getQuestions();
  if(S.cur >= qs.length || S.done) {
    S.cur = 0;
    S.done = false;
  }
  
  render();
}

// ─── INIT ────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`}).then(SQL=>{
    db=new SQL.Database();
    db.run(DB_SQL);
    load();
    render();
  }).catch(e=>{
    document.getElementById('app').innerHTML=`<div class="loading"><p style="color:var(--red)">Błąd: ${e.message}</p></div>`;
  });
});
</script>
